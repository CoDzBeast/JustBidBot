name: Build mobile artifacts

on:
  push:

jobs:
  build:
    name: Build unsigned IPA and APK
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web assets and sync Capacitor
        run: |
          npm run mobile:build
          [ -d android ] || npx cap add android
          [ -d ios ] || npx cap add ios
          ./scripts/configure-native.sh
          npx cap sync

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned iOS app
        run: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find build/ios-derived/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -print -quit)"
          test -n "$APP_PATH"

          mkdir -p build/ios/Payload build/artifacts
          cp -R "$APP_PATH" build/ios/Payload/
          ditto -c -k --keepParent build/ios/Payload build/artifacts/JustBidBot-unsigned.ipa
          ditto -c -k "$APP_PATH" build/artifacts/JustBidBot.app.zip

      - name: Build Android APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -D > app/release.keystore
            ./gradlew assembleRelease \
              -PJUSTBID_ANDROID_KEYSTORE=release.keystore \
              -PJUSTBID_ANDROID_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
              -PJUSTBID_ANDROID_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -PJUSTBID_ANDROID_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          else
            ./gradlew assembleDebug
          fi

      - name: Collect artifacts
        run: |
          mkdir -p build/artifacts
          find android/app/build/outputs/apk -name "*.apk" -exec cp {} build/artifacts/ \;

      - name: Upload IPA and APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-builds
          path: build/artifacts/*
          if-no-files-found: error
