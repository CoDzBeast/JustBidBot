<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>JustBid</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        align-items: center;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: 100%;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      button {
        appearance: none;
        background: #22c55e;
        border: 0;
        border-radius: 6px;
        color: #052e16;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }
      p { color: #cbd5e1; margin: 0; max-width: 32rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>JustBid</h1>
      <p>Opening JustBid in the app wrapper.</p>
      <button id="open-justbid" type="button">Open JustBid</button>
    </main>
    <script>
      const justBidUrl = "https://www.justbid.com/";
      document.getElementById("open-justbid").addEventListener("click", () => {
        window.location.assign(justBidUrl);
      });
      window.setTimeout(() => window.location.replace(justBidUrl), 250);
    </script>
  </body>
</html>
